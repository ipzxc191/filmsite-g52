{% extends 'base.html' %}

{% block title %}{{ film.title }} — Сайт фильмов{% endblock %}

{% block content %}
    <h1>{{ film.title }}</h1>
    <p>Год выпуска: {{ film.year }}</p>
    <p>{{ film.description|default:"Описание отсутствует." }}</p>
    <a href="{% url 'films:film_list' %}">← Назад к каталогу</a>
{% endblock %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог фильмов</title>
</head>
<body>
    <nav>
        <a href="{% url 'index' %}">Главная</a> |
        <a href="{% url 'film_list' %}">Каталог</a> |
        <a href="{% url 'about' %}">О сайте</a>
    </nav>

    <h1>Каталог фильмов</h1>

    {% if films %}
        <p>Всего фильмов: {{ films|length }}</p>
        <ul>
        {% for film in films %}
            <li>
                <a href="{% url 'film_detail' film_id=film.id %}">
                    {{ film.title }}
                </a>
                ({{ film.year }})
                {% if film.year < 2000 %}— классика{% endif %}
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>В каталоге пока нет фильмов.</p>
    {% endif %}
</body>
</html>
